<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420" role="img" aria-label="6-Month AI Engineer Roadmap animated banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="20%" stop-color="#34d399"/>
      <stop offset="40%" stop-color="#a78bfa"/>
      <stop offset="60%" stop-color="#f472b6"/>
      <stop offset="80%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>

  <g opacity="0.15">
    <circle cx="150" cy="80" r="2" fill="#fff"/>
    <circle cx="400" cy="50" r="1.5" fill="#fff"/>
    <circle cx="650" cy="90" r="2" fill="#fff"/>
    <circle cx="950" cy="60" r="1.5" fill="#fff"/>
    <circle cx="1100" cy="100" r="2" fill="#fff"/>
    <circle cx="250" cy="360" r="1.5" fill="#fff"/>
    <circle cx="800" cy="380" r="2" fill="#fff"/>
    <circle cx="1050" cy="350" r="1.5" fill="#fff"/>
  </g>

  <text x="600" y="90" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="52" font-weight="800" fill="url(#titleGrad)" filter="url(#soft)">
    The 6-Month AI Engineer Roadmap
  </text>
  <text x="600" y="128" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#94a3b8" letter-spacing="2">
    FROM PYTHON TO PRODUCTION AI &#x2022; 26 WEEKS &#x2022; 100% FREE
  </text>

  <g transform="translate(60, 180)">
    <g id="phase1">
      <rect x="0" y="0" width="170" height="120" rx="14" fill="#3b82f6" opacity="0.35">
        <animate attributeName="opacity" values="0.35;1;0.35" dur="6s" begin="0s" repeatCount="indefinite"/>
      </rect>
      <text x="85" y="35" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#dbeafe">MONTH 1</text>
      <text x="85" y="65" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="800" fill="#fff">Foundations</text>
      <text x="85" y="95" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="13" fill="#bfdbfe">Python + Math</text>
    </g>

    <g id="phase2" transform="translate(182, 0)">
      <rect x="0" y="0" width="170" height="120" rx="14" fill="#10b981" opacity="0.35">
        <animate attributeName="opacity" values="0.35;1;0.35" dur="6s" begin="1s" repeatCount="indefinite"/>
      </rect>
      <text x="85" y="35" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#d1fae5">MONTH 2</text>
      <text x="85" y="65" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="800" fill="#fff">Machine Learning</text>
      <text x="85" y="95" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="13" fill="#a7f3d0">scikit-learn</text>
    </g>

    <g id="phase3" transform="translate(364, 0)">
      <rect x="0" y="0" width="170" height="120" rx="14" fill="#8b5cf6" opacity="0.35">
        <animate attributeName="opacity" values="0.35;1;0.35" dur="6s" begin="2s" repeatCount="indefinite"/>
      </rect>
      <text x="85" y="35" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#ede9fe">MONTH 3</text>
      <text x="85" y="65" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="800" fill="#fff">Deep Learning</text>
      <text x="85" y="95" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="13" fill="#ddd6fe">PyTorch</text>
    </g>

    <g id="phase4" transform="translate(546, 0)">
      <rect x="0" y="0" width="170" height="120" rx="14" fill="#ec4899" opacity="0.35">
        <animate attributeName="opacity" values="0.35;1;0.35" dur="6s" begin="3s" repeatCount="indefinite"/>
      </rect>
      <text x="85" y="35" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#fce7f3">MONTH 4</text>
      <text x="85" y="65" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="800" fill="#fff">LLMs</text>
      <text x="85" y="95" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="13" fill="#fbcfe8">Transformers</text>
    </g>

    <g id="phase5" transform="translate(728, 0)">
      <rect x="0" y="0" width="170" height="120" rx="14" fill="#f59e0b" opacity="0.35">
        <animate attributeName="opacity" values="0.35;1;0.35" dur="6s" begin="4s" repeatCount="indefinite"/>
      </rect>
      <text x="85" y="35" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#fef3c7">MONTH 5</text>
      <text x="85" y="65" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="800" fill="#fff">RAG &amp; Agents</text>
      <text x="85" y="95" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="13" fill="#fde68a">Vector DBs</text>
    </g>

    <g id="phase6" transform="translate(910, 0)">
      <rect x="0" y="0" width="170" height="120" rx="14" fill="#22c55e" opacity="0.35">
        <animate attributeName="opacity" values="0.35;1;0.35" dur="6s" begin="5s" repeatCount="indefinite"/>
      </rect>
      <text x="85" y="35" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#dcfce7">MONTH 6</text>
      <text x="85" y="65" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="800" fill="#fff">Ship It</text>
      <text x="85" y="95" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="13" fill="#bbf7d0">Deploy + Portfolio</text>
    </g>
  </g>

  <g fill="#64748b" transform="translate(0, 335)">
    <path d="M232 60 L246 60" stroke="#64748b" stroke-width="2" fill="none"/>
    <path d="M244 56 L250 60 L244 64 Z" fill="#64748b"/>
    <path d="M414 60 L428 60" stroke="#64748b" stroke-width="2" fill="none"/>
    <path d="M426 56 L432 60 L426 64 Z" fill="#64748b"/>
    <path d="M596 60 L610 60" stroke="#64748b" stroke-width="2" fill="none"/>
    <path d="M608 56 L614 60 L608 64 Z" fill="#64748b"/>
    <path d="M778 60 L792 60" stroke="#64748b" stroke-width="2" fill="none"/>
    <path d="M790 56 L796 60 L790 64 Z" fill="#64748b"/>
    <path d="M960 60 L974 60" stroke="#64748b" stroke-width="2" fill="none"/>
    <path d="M972 56 L978 60 L972 64 Z" fill="#64748b"/>
  </g>

  <g transform="translate(0, 370)">
    <rect x="60" y="0" width="1080" height="6" rx="3" fill="#1e293b"/>
    <rect x="60" y="0" width="0" height="6" rx="3" fill="url(#titleGrad)">
      <animate attributeName="width" values="0;1080;1080" keyTimes="0;0.9;1" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="60" y="30" font-family="ui-sans-serif, system-ui" font-size="12" fill="#64748b">START</text>
    <text x="1140" y="30" text-anchor="end" font-family="ui-sans-serif, system-ui" font-size="12" fill="#64748b">AI ENGINEER (job-ready)</text>
  </g>
</svg>
