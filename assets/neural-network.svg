<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420" role="img" aria-label="Neural network animation">
  <defs>
    <linearGradient id="nnbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="nglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="420" fill="url(#nnbg)"/>

  <text x="450" y="34" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="800" fill="#f8fafc">Neural Network: Layers of Simple Math Units</text>
  <text x="450" y="56" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="12" fill="#94a3b8">Every LLM (GPT, Claude, Llama) is one of these, just enormously bigger</text>

  <g stroke="#334155" stroke-width="1" opacity="0.6" fill="none">
    <line x1="150" y1="130" x2="360" y2="120"/>
    <line x1="150" y1="130" x2="360" y2="220"/>
    <line x1="150" y1="130" x2="360" y2="320"/>
    <line x1="150" y1="210" x2="360" y2="120"/>
    <line x1="150" y1="210" x2="360" y2="220"/>
    <line x1="150" y1="210" x2="360" y2="320"/>
    <line x1="150" y1="290" x2="360" y2="120"/>
    <line x1="150" y1="290" x2="360" y2="220"/>
    <line x1="150" y1="290" x2="360" y2="320"/>

    <line x1="360" y1="120" x2="560" y2="120"/>
    <line x1="360" y1="120" x2="560" y2="220"/>
    <line x1="360" y1="120" x2="560" y2="320"/>
    <line x1="360" y1="220" x2="560" y2="120"/>
    <line x1="360" y1="220" x2="560" y2="220"/>
    <line x1="360" y1="220" x2="560" y2="320"/>
    <line x1="360" y1="320" x2="560" y2="120"/>
    <line x1="360" y1="320" x2="560" y2="220"/>
    <line x1="360" y1="320" x2="560" y2="320"/>

    <line x1="560" y1="120" x2="760" y2="220"/>
    <line x1="560" y1="220" x2="760" y2="220"/>
    <line x1="560" y1="320" x2="760" y2="220"/>
  </g>

  <g>
    <circle cx="150" cy="130" r="22" fill="#3b82f6">
      <animate attributeName="fill" values="#3b82f6;#60a5fa;#3b82f6" dur="3s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="210" r="22" fill="#3b82f6">
      <animate attributeName="fill" values="#3b82f6;#60a5fa;#3b82f6" dur="3s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="290" r="22" fill="#3b82f6">
      <animate attributeName="fill" values="#3b82f6;#60a5fa;#3b82f6" dur="3s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g>
    <circle cx="360" cy="120" r="22" fill="#8b5cf6">
      <animate attributeName="fill" values="#8b5cf6;#a78bfa;#8b5cf6" dur="3s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="360" cy="220" r="22" fill="#8b5cf6">
      <animate attributeName="fill" values="#8b5cf6;#a78bfa;#8b5cf6" dur="3s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="360" cy="320" r="22" fill="#8b5cf6">
      <animate attributeName="fill" values="#8b5cf6;#a78bfa;#8b5cf6" dur="3s" begin="1.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g>
    <circle cx="560" cy="120" r="22" fill="#8b5cf6">
      <animate attributeName="fill" values="#8b5cf6;#a78bfa;#8b5cf6" dur="3s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="560" cy="220" r="22" fill="#8b5cf6">
      <animate attributeName="fill" values="#8b5cf6;#a78bfa;#8b5cf6" dur="3s" begin="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="560" cy="320" r="22" fill="#8b5cf6">
      <animate attributeName="fill" values="#8b5cf6;#a78bfa;#8b5cf6" dur="3s" begin="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g>
    <circle cx="760" cy="220" r="26" fill="#10b981">
      <animate attributeName="fill" values="#10b981;#34d399;#10b981" dur="3s" begin="2.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="26;32;26" dur="3s" begin="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g fill="#facc15" filter="url(#nglow)">
    <circle r="4">
      <animateMotion dur="3s" repeatCount="indefinite" path="M 150 210 L 360 220 L 560 220 L 760 220"/>
    </circle>
    <circle r="4">
      <animateMotion dur="3s" begin="0.5s" repeatCount="indefinite" path="M 150 130 L 360 120 L 560 120 L 760 220"/>
    </circle>
    <circle r="4">
      <animateMotion dur="3s" begin="1s" repeatCount="indefinite" path="M 150 290 L 360 320 L 560 320 L 760 220"/>
    </circle>
  </g>

  <text x="150" y="380" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="13" font-weight="700" fill="#dbeafe">INPUT</text>
  <text x="150" y="398" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="11" fill="#94a3b8">your data</text>

  <text x="460" y="380" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="13" font-weight="700" fill="#ede9fe">HIDDEN LAYERS</text>
  <text x="460" y="398" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="11" fill="#94a3b8">find patterns (deep = many layers)</text>

  <text x="760" y="380" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="13" font-weight="700" fill="#d1fae5">OUTPUT</text>
  <text x="760" y="398" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="11" fill="#94a3b8">the answer</text>
</svg>
