<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-label="RAG pipeline animation">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="340" fill="url(#bg3)"/>

  <text x="600" y="42" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="22" font-weight="800" fill="#f8fafc">How RAG Works</text>
  <text x="600" y="66" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="13" fill="#94a3b8">Give the AI your documents so it answers from facts, not memory</text>

  <g transform="translate(30, 140)">
    <g>
      <rect x="0" y="0" width="150" height="90" rx="12" fill="#3b82f6" opacity="0.9"/>
      <text x="75" y="35" text-anchor="middle" font-size="30">&#128196;</text>
      <text x="75" y="65" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="13" font-weight="700" fill="#fff">YOUR DOCS</text>
    </g>

    <g transform="translate(180, 0)">
      <rect x="0" y="0" width="150" height="90" rx="12" fill="#10b981" opacity="0.9"/>
      <text x="75" y="35" text-anchor="middle" font-size="26">&#9986;</text>
      <text x="75" y="60" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="700" fill="#fff">SPLIT INTO</text>
      <text x="75" y="76" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="700" fill="#fff">CHUNKS</text>
    </g>

    <g transform="translate(360, 0)">
      <rect x="0" y="0" width="150" height="90" rx="12" fill="#8b5cf6" opacity="0.9"/>
      <text x="75" y="35" text-anchor="middle" font-size="26">&#128290;</text>
      <text x="75" y="60" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="700" fill="#fff">EMBED</text>
      <text x="75" y="76" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="11" fill="#ddd6fe">(&#8594; numbers)</text>
    </g>

    <g transform="translate(540, 0)">
      <rect x="0" y="0" width="150" height="90" rx="12" fill="#ec4899" opacity="0.9"/>
      <text x="75" y="35" text-anchor="middle" font-size="26">&#128451;</text>
      <text x="75" y="60" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="700" fill="#fff">VECTOR</text>
      <text x="75" y="76" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="700" fill="#fff">DATABASE</text>
    </g>

    <g transform="translate(720, 0)">
      <rect x="0" y="0" width="150" height="90" rx="12" fill="#f59e0b" opacity="0.9"/>
      <text x="75" y="35" text-anchor="middle" font-size="26">&#127919;</text>
      <text x="75" y="60" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="700" fill="#fff">RETRIEVE</text>
      <text x="75" y="76" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="11" fill="#fef3c7">top matches</text>
    </g>

    <g transform="translate(900, 0)">
      <rect x="0" y="0" width="150" height="90" rx="12" fill="#22c55e" opacity="0.9"/>
      <text x="75" y="35" text-anchor="middle" font-size="26">&#128172;</text>
      <text x="75" y="60" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="700" fill="#fff">LLM WRITES</text>
      <text x="75" y="76" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="700" fill="#fff">ANSWER</text>
    </g>

    <g stroke="#64748b" stroke-width="2" fill="none">
      <path d="M150 45 L180 45"/>
      <path d="M330 45 L360 45"/>
      <path d="M510 45 L540 45"/>
      <path d="M690 45 L720 45"/>
      <path d="M870 45 L900 45"/>
    </g>
    <g fill="#64748b">
      <path d="M175 40 L185 45 L175 50 Z"/>
      <path d="M355 40 L365 45 L355 50 Z"/>
      <path d="M535 40 L545 45 L535 50 Z"/>
      <path d="M715 40 L725 45 L715 50 Z"/>
      <path d="M895 40 L905 45 L895 50 Z"/>
    </g>
  </g>

  <g>
    <circle r="7" fill="#facc15" filter="url(#glow3)">
      <animateMotion dur="4s" repeatCount="indefinite" keyTimes="0;0.15;0.3;0.45;0.6;0.75;0.9;1"
                     keyPoints="0;0.16;0.33;0.5;0.66;0.83;1;1"
                     path="M 105 185 L 285 185 L 465 185 L 645 185 L 825 185 L 1005 185 L 1005 185"/>
    </circle>
  </g>

  <g transform="translate(0, 290)">
    <text x="30" y="0" font-family="ui-sans-serif, system-ui" font-size="12" fill="#94a3b8">
      <tspan font-weight="700" fill="#facc15">User asks a question</tspan> &#8594; question is embedded &#8594; database finds most similar chunks &#8594; those chunks + the question go to the LLM &#8594; grounded answer with citations
    </text>
  </g>
</svg>
